<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JourneyVerse - Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <!-- Background image applied via CSS -->
        </div>
        <div class="right-panel">
            <div class="logo-area signup-logo">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="JourneyVerse Logo"
                        style="width: 100%; height: auto;">
                </div>
            </div>

            <h2>Sign Up</h2>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('signup') }}" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email I'D</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-footer">
                    <span>Already A Member</span>
                    <a href="{{ url_for('login') }}" class="link-btn">Log in</a>
                </div>

                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
        </div>
    </div>
</body>

</html>
